<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoniFy-Ping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/jpeg" href="static/logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        bg: '#0b0e14',
                        sidebar: '#0b0e14',
                        card: '#151a23',
                        border: '#242c35',
                        primary: '#3b82f6',
                        success: '#22c55e',
                        danger: '#ef4444',
                        warning: '#eab308'
                    }
                }
            }
        }
    </script>
    <style>
        .logo-circle { width: 48px; height: 48px; }
        .logo-circle img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body class="bg-bg text-gray-300 flex items-center justify-center h-screen selection:bg-primary selection:text-white">
    <div class="w-full max-w-md p-8 bg-card border border-border rounded-xl shadow-2xl">
        <div class="flex justify-center mb-6">
            <div class="logo-circle">
                <img src="static/logo.jpg" alt="MoniFy-Ping Logo">
            </div>
        </div>
        <h2 class="text-2xl font-bold text-center text-white mb-2">MoniFy-Ping</h2>
        <p class="text-center text-gray-500 text-sm mb-8">Sign in or create your free account.</p>

        <div id="error-msg" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 p-3 rounded-lg mb-6 text-sm text-center"></div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Email</label>
                <input type="email" id="email" class="w-full bg-bg border border-border rounded-lg px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none text-white transition-all" required>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Password</label>
                <input type="password" id="password" class="w-full bg-bg border border-border rounded-lg px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none text-white transition-all" required>
            </div>
            <button type="submit" class="w-full bg-primary hover:bg-blue-600 text-white font-medium py-2.5 rounded-lg transition-all shadow-lg shadow-blue-500/20">Sign In</button>
        </form>
        
        <div class="mt-6 pt-4 border-t border-border text-center">
            <p class="text-sm text-gray-500">
                Don't have an account? 
                <a href="register.html" class="text-primary hover:underline font-medium">Sign Up</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('http://127.0.0.1:8000/auth/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = 'static/dashboard.html';
                } else {
                    document.getElementById('error-msg').innerText = data.detail || 'Login failed';
                    document.getElementById('error-msg').classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('error-msg').innerText = 'Cannot connect to server';
                document.getElementById('error-msg').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
