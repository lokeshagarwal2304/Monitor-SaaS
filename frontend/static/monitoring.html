<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoniFy-Ping — Monitoring Dashboard</title>
  <meta name="description" content="MoniFy-Ping: Professional uptime monitoring platform.">
  <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/static/css/custom.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config={corePlugins:{preflight:false},darkMode:'class',theme:{extend:{colors:{
      success:'#22c55e',danger:'#ef4444',warning:'#eab308',primary:'#2563eb',
      bg:'var(--bg-main)',card:'var(--bg-panel)',border:'var(--border-main)',hover:'var(--bg-hover)'
    }}}}
  </script>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<canvas id="particles-canvas"></canvas>

<div class="app-shell">

  <!-- ═══════════════ SIDEBAR ═══════════════ -->
  <div id="sidebar-container"></div>

  <!-- ═══════════════ MAIN ═══════════════ -->
  <main class="main-content">

    <!-- Top Header -->
    <header class="top-header">
      <div class="header-left">
        <h1 class="header-title">Uptime</h1>
        <span id="admin-badge" class="badge-admin hidden">SUPER ADMIN</span>
      </div>
      <div class="header-right" id="admin-actions-container">
        <button id="theme-toggle" class="theme-btn" title="Toggle theme">
          <i id="theme-toggle-dark-icon" data-lucide="moon"></i>
          <i id="theme-toggle-light-icon" data-lucide="sun" style="color:#eab308;display:none;"></i>
        </button>
        <button onclick="toggleBulkModal()" class="btn btn-glass" id="bulk-import-btn">
          <i data-lucide="upload"></i>
          <span class="btn-label">Bulk Import</span>
        </button>
        <button onclick="toggleModal('add-modal')" class="btn btn-primary" id="create-new-btn">
          <i data-lucide="plus"></i>
          <span class="btn-label">Create new</span>
        </button>
      </div>
    </header>

    <!-- Content Body -->
    <div class="content-body" id="content-view">

      <!-- ══════ UPTIME VIEW (main) ══════ -->
      <div id="uptime-view" style="display:flex;flex:1;overflow:hidden;">

        <!-- Left: monitors area -->
        <div class="monitors-area">

          <!-- Greeting -->
          <div class="greeting-bar">
            <h1 class="greeting-title">Hey there, <span class="greeting-name" id="greeting-name-display">User</span> 🍕</h1>
            <p class="greeting-sub">Here's an overview of your MoniFy-Ping monitors.</p>
          </div>

          <!-- Search + Filter -->
          <div class="search-filter-bar">
            <div class="search-wrap">
              <i data-lucide="search" class="search-icon"></i>
              <input type="text" id="monitor-search" placeholder="Search monitors..." oninput="filterMonitorCards()" autocomplete="off">
            </div>
            <select class="filter-select" id="status-filter" onchange="filterMonitorCards()">
              <option value="all">All Status</option>
              <option value="up">UP</option>
              <option value="down">DOWN</option>
              <option value="paused">Paused</option>
            </select>
            <select class="filter-select" id="sort-filter" onchange="filterMonitorCards()">
              <option value="default">Sort: Default</option>
              <option value="response">Response Time</option>
              <option value="down">Down First</option>
              <option value="name">Name A-Z</option>
            </select>
            <div class="monitor-counter">
              <span class="counter-dot"></span>
              <span id="monitor-count">0 monitors</span>
            </div>
          </div>

          <!-- Monitor List Header -->
          <div class="monitor-list-header">
            <div>Monitor</div>
            <div style="text-align:center;">Status</div>
            <div>Response Time</div>
            <div>Interval</div>
            <div>Uptime History</div>
            <div style="text-align:right;">Actions</div>
          </div>

          <!-- Monitor Cards List -->
          <div class="monitor-cards-list" id="monitor-cards-container">
            <div class="cards-empty" id="cards-empty-state">
              <p style="font-size:15px;margin-bottom:6px;">🚀 No monitors yet</p>
              <p style="color:#2d4a62;">Click "Create new" to add your first monitor.</p>
            </div>
          </div>
        </div><!-- /monitors-area -->
      </div><!-- /uptime-view -->
    </div><!-- /content-view -->
  </main>
</div><!-- /app-shell -->

<!-- ADD MONITOR MODAL -->
<div id="add-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Add New Monitor</div>
    <div class="modal-sub">Track uptime and response time for any URL.</div>
    <form id="add-form">
      <div class="form-group"><label class="form-label" for="site-name">Display Name</label><input type="text" id="site-name" class="form-input" placeholder="Prod Server" autocomplete="off"></div>
      <div class="form-group"><label class="form-label" for="site-url">URL</label><input type="text" id="site-url" class="form-input" placeholder="google.com" autocomplete="off"></div>
      <div class="form-group"><label class="form-label" for="site-interval">Check Interval (mins)</label><input type="number" id="site-interval" class="form-input" value="5" min="1"></div>
      <div class="modal-actions">
        <button type="button" onclick="toggleModal('add-modal')" class="btn-cancel">Cancel</button>
        <button type="submit" class="btn-submit">Create Monitor</button>
      </div>
    </form>
  </div>
</div>

<!-- PARTICLES -->
<script>
console.log("Page Loaded: Monitoring");
(function(){
  const c=document.getElementById('particles-canvas'),ctx=c.getContext('2d');
  let W,H;
  const r=()=>{W=c.width=innerWidth;H=c.height=innerHeight;};
  window.addEventListener('resize',r);r();
  const cols=['rgba(29,78,216,','rgba(6,182,212,','rgba(124,58,237,','rgba(16,185,129,'];
  const pts=Array.from({length:50},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,rx:(Math.random()-.5)*.28,ry:(Math.random()-.5)*.28,rad:Math.random()*1.3+.3,a:Math.random()*.4+.07,c:cols[Math.floor(Math.random()*cols.length)]}));
  (function f(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);
      if(d<115){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(37,99,235,${(1-d/115)*.06})`;ctx.lineWidth=.5;ctx.stroke();}
    }
    pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.rad,0,Math.PI*2);ctx.fillStyle=p.c+p.a+')';ctx.fill();p.x+=p.rx;p.y+=p.ry;if(p.x<-5||p.x>W+5)p.rx*=-1;if(p.y<-5||p.y>H+5)p.ry*=-1;});
    requestAnimationFrame(f);
  })();
})();
</script>

<script src="/static/js/config.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/app.js?v=3"></script>
<script src="/static/js/dashboard.js"></script>
<script src="/static/js/toast.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
