<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support — MoniFy-Ping</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
  <link rel="stylesheet" href="/static/css/custom.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .support-container {
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
    }
    .support-icon {
      width: 72px;
      height: 72px;
      background: rgba(59, 130, 246, 0.12);
      color: #3b82f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .support-icon i { width: 36px; height: 36px; }
    .btn-contact {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      transition: all 0.2s;
      text-decoration: none;
      margin-top: 24px;
    }
    .btn-contact:hover {
      box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="app-shell">
  <div id="sidebar-container"></div>
  <main class="main-content">
    <header class="top-header">
      <div class="header-left"><h1 class="header-title">Help &amp; Support</h1></div>
      <div class="header-right">
        <button id="theme-toggle" class="theme-btn" title="Toggle theme">
          <i id="theme-toggle-dark-icon" data-lucide="moon"></i>
          <i id="theme-toggle-light-icon" data-lucide="sun" style="color:#eab308;display:none;"></i>
        </button>
      </div>
    </header>

    <div class="content-body" id="content-view" style="padding:40px;overflow-y:auto;">
      <div class="support-container">
        <div class="glass-panel" style="padding:48px 40px;">
          <div class="support-icon">
            <i data-lucide="life-buoy"></i>
          </div>
          <h2 style="color:#fff;font-size:26px;font-weight:800;margin-bottom:12px;">Contact Support</h2>
          <p style="color:var(--text-muted);font-size:15px;line-height:1.6;">
            Need help with your monitors or account? Our admin team is here to assist you.
          </p>
          <div style="margin-top:24px;padding:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;text-align:left;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
              <i data-lucide="mail" style="width:16px;height:16px;color:#3b82f6;"></i>
              <span style="color:var(--text-muted);font-size:13px;">admin@monify-ping.com</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <i data-lucide="clock" style="width:16px;height:16px;color:#22c55e;"></i>
              <span style="color:var(--text-muted);font-size:13px;">Response within 24 hours</span>
            </div>
          </div>
          <button id="notify-admin" class="btn-contact">
            <i data-lucide="send"></i> Contact Admin
          </button>
        </div>
      </div>
    </div>
  </main>
</div><!-- /app-shell -->

<div id="support-toast" style="position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:12px 24px;border-radius:10px;font-weight:600;font-size:14px;transform:translateY(100px);opacity:0;transition:all 0.3s;z-index:1000;">
  ✅ Admin has been notified!
</div>

<script src="/static/js/config.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/app.js?v=3"></script>
<script src="/static/js/toast.js"></script>
<script>
  console.log("Page Loaded: Support");
  lucide.createIcons();

  document.addEventListener("DOMContentLoaded", () => {
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '/'; return; }

    const btn = document.getElementById('notify-admin');
    const toast = document.getElementById('support-toast');

    btn.addEventListener('click', () => {
      toast.style.transform = 'translateY(0)';
      toast.style.opacity = '1';
      setTimeout(() => {
        toast.style.transform = 'translateY(100px)';
        toast.style.opacity = '0';
      }, 3000);
    });

    lucide.createIcons();
  });
</script>
</body>
</html>
