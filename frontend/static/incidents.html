<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoniFy-Ping — Incidents</title>
  <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/static/css/custom.css">
  <style>
    :root {
      --accent-ongoing: #ef4444;
      --accent-resolved: #22c55e;
      --accent-warning: #eab308;
    }

    .incident-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card-premium {
      background: rgba(8, 14, 30, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .stat-card-premium:hover {
      background: rgba(8, 14, 30, 0.6);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .stat-card-premium i {
      width: 24px;
      height: 24px;
      margin-bottom: 12px;
      opacity: 0.8;
    }

    .stat-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
    }

    .main-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
    }

    .incident-table-container {
      background: rgba(8, 14, 30, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
    }

    .search-filter-bar {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.01);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .search-box {
      flex: 1;
      position: relative;
    }

    .search-box i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      width: 16px;
    }

    .search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 12px 10px 36px;
      color: #fff;
      font-size: 14px;
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
    }

    .filter-select {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0 12px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      min-width: 140px;
    }

    .incidents-table {
      width: 100%;
      border-collapse: collapse;
    }

    .incidents-table th {
      text-align: left;
      padding: 14px 24px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      font-weight: 700;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .incidents-table td {
      padding: 16px 24px;
      font-size: 14px;
      color: #e2e8f0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .incidents-table tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-ongoing { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    .status-resolved { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }

    .change-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }

    .change-down { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    .change-up { background: rgba(34, 197, 94, 0.1); color: #22c55e; }

    .chart-panel {
      background: rgba(8, 14, 30, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      height: fit-content;
    }

    .chart-header {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
    }

    .chart-container {
      position: relative;
      width: 100%;
      height: 200px;
      margin-bottom: 20px;
    }

    .chart-legend {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .legend-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .legend-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .duration-pills {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }

    .pill {
      height: 4px;
      width: 12px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
    }

    .pill.active-warning { background: var(--accent-warning); }
    .pill.active-danger { background: var(--accent-ongoing); }

    .empty-incidents {
      padding: 80px 40px;
      text-align: center;
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="app-shell">
  <div id="sidebar-container"></div>

  <main class="main-content">
    <header class="top-header">
      <div class="header-left">
        <h1 class="header-title">Incidents</h1>
        <p style="font-size:13px; color:var(--text-dim); margin-left:4px;">Real-time incident tracking</p>
      </div>
      <div>
        <button class="btn btn-glass" onclick="loadIncidents()"><i data-lucide="refresh-cw"></i> Refresh</button>
      </div>
    </header>

    <div style="padding: 0 26px 24px;">
      <!-- TOP STATS -->
      <div class="incident-stats-grid">
        <div class="stat-card-premium">
          <i data-lucide="alert-triangle" style="color:var(--accent-warning);"></i>
          <span class="stat-label">Total Incidents</span>
          <span class="stat-value" id="stats-total">--</span>
        </div>
        <div class="stat-card-premium">
          <i data-lucide="activity" style="color:var(--accent-ongoing);"></i>
          <span class="stat-label">Ongoing</span>
          <span class="stat-value" id="stats-ongoing">--</span>
        </div>
        <div class="stat-card-premium">
          <i data-lucide="check-circle" style="color:var(--accent-resolved);"></i>
          <span class="stat-label">Resolved</span>
          <span class="stat-value" id="stats-resolved">--</span>
        </div>
        <div class="stat-card-premium">
          <i data-lucide="clock" style="color:var(--primary);"></i>
          <span class="stat-label">Avg Duration</span>
          <span class="stat-value" id="stats-avg">--</span>
        </div>
      </div>

      <div class="main-layout">
        <!-- LEFT TABLE -->
        <div class="incident-table-container">
          <div class="search-filter-bar">
            <div class="search-box">
              <i data-lucide="search"></i>
              <input type="text" id="incident-search" class="search-input" placeholder="Search monitor...">
            </div>
            <select id="status-filter" class="filter-select">
              <option value="">All Statuses</option>
              <option value="ongoing">Ongoing</option>
              <option value="resolved">Resolved</option>
            </select>
          </div>

          <div style="overflow-x:auto;">
            <table class="incidents-table">
              <thead>
                <tr>
                  <th>Monitor</th>
                  <th>Status Change</th>
                  <th>State</th>
                  <th>Started At</th>
                  <th>Resolved At</th>
                  <th>Duration</th>
                  <th>Reason</th>
                </tr>
              </thead>
              <tbody id="incidents-tbody">
                <!-- Data injected here -->
              </tbody>
            </table>
            <div id="incidents-loader" style="display:none; padding: 40px; text-align:center;">
              <i data-lucide="loader" class="animate-spin" style="width:32px; height:32px; color:var(--primary); margin:0 auto;"></i>
            </div>
            <div id="incidents-empty" class="empty-incidents" style="display:none;">
              <div class="empty-icon"><i data-lucide="shield-check" style="width:32px; height:32px;"></i></div>
              <h3 style="color:#fff; margin-bottom:8px;">No Incidents Found</h3>
              <p style="color:var(--text-dim);">Your systems are running smooth!</p>
            </div>
          </div>
        </div>

        <!-- RIGHT CHART -->
        <div class="chart-panel">
          <h3 class="chart-header">Incident Status</h3>
          <div class="chart-container">
            <canvas id="statusChart"></canvas>
          </div>
          <div class="chart-legend">
            <div class="legend-item">
              <div class="legend-label">
                <span class="legend-dot" style="background:#ef4444;"></span> Ongoing
              </div>
              <span id="chart-ongoing-count" style="color:#fff; font-weight:700;">--</span>
            </div>
            <div class="legend-item">
              <div class="legend-label">
                <span class="legend-dot" style="background:#22c55e;"></span> Resolved
              </div>
              <span id="chart-resolved-count" style="color:#fff; font-weight:700;">--</span>
            </div>
          </div>
          
          <!-- SUMMARY PILL -->
          <div style="margin-top:auto; padding-top:24px; border-top:1px solid rgba(255,255,255,0.06);">
            <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.02); border-radius:12px; padding:12px 16px;">
                <span style="font-size:12px; color:var(--text-dim); font-weight:600;">System Health</span>
                <span id="health-pct" style="font-size:14px; font-weight:800; color:var(--accent-resolved);">--%</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/static/js/app.js"></script>
<script>
(function() {
  const API_URL = window.location.origin;
  const token = localStorage.getItem('token');
  let allIncidents = [];
  let statusChart = null;

  async function loadIncidents() {
      const tbody = document.getElementById('incidents-tbody');
      const loader = document.getElementById('incidents-loader');
      const empty = document.getElementById('incidents-empty');
      
      tbody.innerHTML = '';
      loader.style.display = 'block';
      empty.style.display = 'none';

      try {
          const res = await fetch(`${API_URL}/api/incidents/`, {
              headers: { 'Authorization': `Bearer ${token}` }
          });
          if (!res.ok) throw new Error("API Failed");
          const data = await res.json();
          
          allIncidents = data.incidents;
          updateStats(data.stats);
          renderTable(allIncidents);
          updateChart(data.stats);
          
      } catch (err) {
          console.error('Failed to load incidents:', err);
          tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-red-400">Failed to load incidents. Please try again.</td></tr>`;
      } finally {
          loader.style.display = 'none';
      }
  }

  function updateStats(stats) {
    document.getElementById('stats-total').innerText = stats.total;
    document.getElementById('stats-ongoing').innerText = stats.ongoing;
    document.getElementById('stats-resolved').innerText = stats.resolved;
    document.getElementById('stats-avg').innerText = stats.avg_duration;
    
    document.getElementById('chart-ongoing-count').innerText = stats.ongoing;
    document.getElementById('chart-resolved-count').innerText = stats.resolved;
    
    const health = stats.total > 0 ? Math.round((stats.resolved / stats.total) * 100) : 100;
    document.getElementById('health-pct').innerText = `${health}%`;
  }

  function renderTable(incidents) {
    const tbody = document.getElementById('incidents-tbody');
    const empty = document.getElementById('incidents-empty');
    
    if (!incidents || incidents.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
    }

    empty.style.display = 'none';
    tbody.innerHTML = incidents.map(inc => {
        const isOngoing = inc.state === 'Ongoing';
        const stateClass = isOngoing ? 'status-ongoing' : 'status-resolved';
        const changeClass = inc.status_change === 'DOWN' ? 'change-down' : 'change-up';
        const changeIcon = inc.status_change === 'DOWN' ? 'heart' : 'arrow-up-circle';
        const barColor = isOngoing ? '#ef4444' : '#22c55e';
        
        const startedAt = formatDate(inc.started_at);
        const resolvedAt = inc.resolved_at ? formatDate(inc.resolved_at) : 'Ongoing';
        
        // Generate duration pills for premium look
        let pills = '';
        if (inc.state === 'Resolved') {
            const level = Math.min(6, Math.max(1, Math.ceil(inc.duration_seconds / 3600)));
            for(let i=0; i<6; i++) {
                pills += `<div class="pill ${i < level ? 'active-warning' : ''}"></div>`;
            }
        } else {
            // Animated pills for ongoing
            for(let i=0; i<6; i++) {
                pills += `<div class="pill" style="background:#ef4444; opacity:${0.2 + (i * 0.1)};"></div>`;
            }
        }

        return `
            <tr>
                <td style="border-left: 3px solid ${barColor};">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div style="width:28px; height:28px; background:rgba(255,255,255,0.05); border-radius:6px; display:flex; align-items:center; justify-content:center;">
                            <i data-lucide="globe" style="width:16px; height:16px; color:var(--text-dim);"></i>
                        </div>
                        <div>
                            <div style="font-weight:700; color:#fff; font-size:14px;">${inc.monitor_name}</div>
                            <div style="font-size:11px; color:var(--text-dim);">System Monitor</div>
                        </div>
                    </div>
                </td>
                <td>
                    <div class="change-badge ${changeClass}">
                        <i data-lucide="${inc.status_change === 'DOWN' ? 'heart' : 'arrow-up-circle'}" style="width:10px; height:10px;"></i>
                        ${inc.status_change}
                    </div>
                </td>
                <td><span class="status-badge ${stateClass}" style="padding: 4px 12px; font-weight:700;">${inc.state}</span></td>
                <td style="font-size:13px; color:var(--text-dim);">${startedAt}</td>
                <td style="font-size:13px; color:var(--text-dim);">${resolvedAt}</td>
                <td>
                    <div>
                        <div style="font-weight:800; color:#fff;">${inc.duration}</div>
                        <div class="duration-pills">${pills}</div>
                    </div>
                </td>
                <td style="font-size:12px; color:var(--text-dim); max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${inc.reason}">
                    ${inc.reason}
                </td>
            </tr>
        `;
    }).join('');
    
    lucide.createIcons();
  }

  function formatDate(iso) {
      if(!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function updateChart(stats) {
    const ctx = document.getElementById('statusChart').getContext('2d');
    
    if (statusChart) statusChart.destroy();
    
    if (stats.total === 0) {
        // Show empty doughnut
        statusChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [1],
                    backgroundColor: ['rgba(255,255,255,0.05)'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%', events: [] }
        });
        return;
    }

    statusChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Ongoing', 'Resolved'],
            datasets: [{
                data: [stats.ongoing, stats.resolved],
                backgroundColor: ['#ef4444', '#22c55e'],
                hoverOffset: 4,
                borderWidth: 0,
                borderRadius: 4
            }]
        },
        options: {
            cutout: '80%',
            plugins: {
                legend: { display: false }
            }
        }
    });
  }

  // Handle Search & Filter
  function applyFilters() {
      const searchTerm = document.getElementById('incident-search').value.toLowerCase();
      const statusFilter = document.getElementById('status-filter').value.toLowerCase();
      
      const filtered = allIncidents.filter(inc => {
          const matchesSearch = inc.monitor_name.toLowerCase().includes(searchTerm);
          const matchesStatus = !statusFilter || inc.state.toLowerCase() === statusFilter;
          return matchesSearch && matchesStatus;
      });
      
      renderTable(filtered);
  }

  document.getElementById('incident-search').addEventListener('input', applyFilters);
  document.getElementById('status-filter').addEventListener('change', applyFilters);

  document.addEventListener('DOMContentLoaded', loadIncidents);
  window.loadIncidents = loadIncidents;
})();
</script>
</body>
</html>
