<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoniFy-Ping — Incidents</title>
  <meta name="description" content="View all monitoring incidents and outage history on MoniFy-Ping.">
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/custom.css">
  <style>
    .incidents-table {
      width: 100%; border-collapse: separate; border-spacing: 0 6px;
    }
    .incidents-table thead th {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: #4d6a80; padding: 0 16px 8px;
      text-align: left;
    }
    .incidents-table tbody tr {
      background: rgba(8,14,30,0.75); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; transition: background 0.2s;
    }
    .incidents-table tbody tr:hover {
      background: rgba(37,99,235,0.07);
    }
    .incidents-table tbody td {
      padding: 14px 16px; font-size: 13px; color: #c8d6e8;
      vertical-align: middle;
    }
    .incidents-table tbody td:first-child { border-radius: 10px 0 0 10px; }
    .incidents-table tbody td:last-child { border-radius: 0 10px 10px 0; }
    
    .badge-up    { background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
    .badge-down  { background: rgba(239,68,68,0.12);  color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }
    .status-badge-sm {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .change-arrow {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600;
    }
    .resolved-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
      background: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.2);
    }
    .ongoing-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
      background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2);
    }
    .empty-state { 
      text-align: center; padding: 60px 20px; color: #4d6a80;
    }
    .filter-bar {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .filter-input {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #e2eaf4;
      outline: none;
    }
    .stat-chip {
      background: rgba(8,14,30,0.8); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 12px 20px; text-align: center; min-width: 120px;
    }
  </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><img src="logo.jpg" alt="MoniFy"></div>
      <span class="sidebar-logo-text">MoniFy-Ping</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><i data-lucide="activity"></i> Monitors</a>
      <a href="incidents.html" class="nav-item active"><i data-lucide="alert-circle"></i> Incidents</a>
      <a href="#" class="nav-item"><i data-lucide="wifi"></i> Status Pages</a>
    </nav>
  </aside>

  <main class="main-content">
    
    <header class="top-header">
      <div class="header-left">
        <h1 class="header-title">Incidents</h1>
        <p style="font-size:13px; color:#4d6a80; margin-left:4px;">Real-time outage tracking</p>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-glass" onclick="loadIncidents()"><i data-lucide="refresh-cw"></i> Refresh</button>
      </div>
    </header>

    <!-- Stats Row -->
    <div style="display:flex; gap:12px; padding: 0 26px 20px; flex-wrap:wrap;" id="stats-row">
      <div class="stat-chip">
        <div id="stat-total" style="font-size:24px; font-weight:800; color:#fff;">-</div>
        <div style="font-size:11px; color:#4d6a80; margin-top:2px;">Total Incidents</div>
      </div>
      <div class="stat-chip">
        <div id="stat-open" style="font-size:24px; font-weight:800; color:#f87171;">-</div>
        <div style="font-size:11px; color:#4d6a80; margin-top:2px;">Ongoing</div>
      </div>
      <div class="stat-chip">
        <div id="stat-resolved" style="font-size:24px; font-weight:800; color:#22c55e;">-</div>
        <div style="font-size:11px; color:#4d6a80; margin-top:2px;">Resolved</div>
      </div>
      <div class="stat-chip">
        <div id="stat-avg-dur" style="font-size:24px; font-weight:800; color:#f0c566;">-</div>
        <div style="font-size:11px; color:#4d6a80; margin-top:2px;">Avg Duration</div>
      </div>
    </div>

    <div class="content-body" style="overflow-y:auto; padding: 0 26px 40px;">
      
      <!-- Filter Bar -->
      <div class="filter-bar" style="margin-bottom:16px;">
        <input class="filter-input" id="search-input" placeholder="Search monitor..." oninput="filterTable()" style="width:220px;">
        <select class="filter-input" id="status-filter" onchange="filterTable()">
          <option value="all">All Statuses</option>
          <option value="ongoing">Ongoing</option>
          <option value="resolved">Resolved</option>
        </select>
      </div>

      <!-- Table -->
      <div style="background: rgba(8,14,30,0.75); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; overflow:hidden;">
        
        <div style="padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center;">
          <h2 style="font-size:15px; font-weight:700; color:#fff;">Incident Log</h2>
          <span id="incident-count" style="font-size:12px; color:#4d6a80;"></span>
        </div>
        
        <div style="overflow-x:auto;">
          <table class="incidents-table">
            <thead>
              <tr>
                <th>Monitor</th>
                <th>User</th>
                <th>Status Change</th>
                <th>State</th>
                <th>Started At</th>
                <th>Resolved At</th>
                <th>Duration</th>
              </tr>
            </thead>
            <tbody id="incidents-tbody">
              <tr><td colspan="7" class="empty-state"><i data-lucide="loader" style="width:24px; height:24px; margin-bottom:8px; display:block; margin:0 auto 8px;"></i>Loading incidents...</td></tr>
            </tbody>
          </table>
        </div>
        
      </div>
    </div>
  </main>
</div>

<script src="js/toast.js"></script>
<script>
  lucide.createIcons();

  const API_URL = "http://127.0.0.1:8000";
  const token = localStorage.getItem('token');
  if (!token) window.location.href = 'index.html';

  let allIncidents = [];

  function formatDate(dt) {
    if (!dt) return '--';
    const d = new Date(dt + 'Z');
    return d.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  function formatDuration(secs) {
    if (!secs) return '--';
    const m = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    if (m === 0) return `${s}s`;
    if (m < 60) return `${m}m ${s}s`;
    const h = Math.floor(m / 60);
    return `${h}h ${m % 60}m`;
  }

  async function loadIncidents() {
    try {
      const res = await fetch(`${API_URL}/api/monitors/all-incidents`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allIncidents = await res.json();
      renderStats(allIncidents);
      filterTable();
    } catch(err) {
      console.error(err);
      document.getElementById('incidents-tbody').innerHTML = `
        <tr><td colspan="7" class="empty-state" style="color:#ef4444;">
          <i data-lucide="alert-circle" style="width:24px; height:24px; display:block; margin:0 auto 8px;"></i>
          Failed to load incidents. Is the server running?
        </td></tr>`;
      lucide.createIcons();
    }
  }

  function renderStats(incidents) {
    const open = incidents.filter(i => !i.resolved_at).length;
    const resolved = incidents.filter(i => i.resolved_at).length;
    const durations = incidents.filter(i => i.duration_seconds).map(i => i.duration_seconds);
    const avgDur = durations.length ? durations.reduce((a,b)=>a+b,0)/durations.length : null;

    document.getElementById('stat-total').innerText = incidents.length;
    document.getElementById('stat-open').innerText = open;
    document.getElementById('stat-resolved').innerText = resolved;
    document.getElementById('stat-avg-dur').innerText = avgDur ? formatDuration(avgDur) : '--';
  }

  function filterTable() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const statusFilter = document.getElementById('status-filter').value;

    const filtered = allIncidents.filter(inc => {
      const matchSearch = (inc.monitor_name || '').toLowerCase().includes(search)
                       || (inc.monitor_url || '').toLowerCase().includes(search)
                       || (inc.user_name || '').toLowerCase().includes(search);
      const isResolved = !!inc.resolved_at;
      const matchStatus = statusFilter === 'all'
        || (statusFilter === 'ongoing' && !isResolved)
        || (statusFilter === 'resolved' && isResolved);
      return matchSearch && matchStatus;
    });

    document.getElementById('incident-count').innerText = `${filtered.length} incident${filtered.length !== 1 ? 's' : ''}`;
    renderRows(filtered);
  }

  function renderRows(incidents) {
    const tbody = document.getElementById('incidents-tbody');
    if (incidents.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-state">
        <div style="font-size:32px; margin-bottom:8px;">✅</div>
        <div style="font-size:15px; color:#fff; font-weight:600; margin-bottom:4px;">No incidents found</div>
        <div style="font-size:12px;">All your monitors are running smoothly.</div>
      </td></tr>`;
      lucide.createIcons();
      return;
    }

    tbody.innerHTML = incidents.map(inc => {
      const prevBadge = `<span class="status-badge-sm badge-${inc.previous_status || 'up'}">${(inc.previous_status||'up').toUpperCase()}</span>`;
      const newBadge  = `<span class="status-badge-sm badge-${inc.new_status || 'down'}">${(inc.new_status||'down').toUpperCase()}</span>`;
      const stateTag = inc.resolved_at
        ? `<span class="resolved-tag"><i data-lucide="check-circle" style="width:11px;height:11px;"></i> Resolved</span>`
        : `<span class="ongoing-tag"><i data-lucide="alert-circle" style="width:11px;height:11px;"></i> Ongoing</span>`;
      const faviconUrl = inc.monitor_url ? `https://www.google.com/s2/favicons?domain=${encodeURIComponent(inc.monitor_url)}&sz=16` : '';

      return `<tr>
        <td>
          <div style="display:flex; align-items:center; gap:8px;">
            ${faviconUrl ? `<img src="${faviconUrl}" style="width:16px;height:16px;border-radius:3px;" onerror="this.style.display='none'">` : ''}
            <div>
              <div style="font-weight:700; color:#fff; font-size:13px;">${inc.monitor_name || 'Unknown'}</div>
              <div style="font-size:11px; color:#4d6a80;">${inc.monitor_url || ''}</div>
            </div>
          </div>
        </td>
        <td>
          <div style="display:flex; align-items:center; gap:6px;">
            <i data-lucide="user" style="width:12px;height:12px;color:#8aafc8;"></i>
            <span style="font-size:12px; color:#8aafc8;">${inc.user_name || 'System'}</span>
          </div>
        </td>
        <td>
          <div class="change-arrow">
            ${prevBadge}
            <i data-lucide="arrow-right" style="width:14px;height:14px;color:#4d6a80;"></i>
            ${newBadge}
          </div>
        </td>
        <td>${stateTag}</td>
        <td style="white-space:nowrap;">${formatDate(inc.started_at)}</td>
        <td style="white-space:nowrap;">${inc.resolved_at ? formatDate(inc.resolved_at) : '<span style="color:#f87171;font-size:11px;">Still ongoing</span>'}</td>
        <td style="font-weight:600; color:${inc.resolved_at ? '#22c55e' : '#f87171'};">${formatDuration(inc.duration_seconds)}</td>
      </tr>`;
    }).join('');

    lucide.createIcons();
  }

  loadIncidents();
</script>
</body>
</html>
