<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status Pages — MoniFy-Ping</title>
  <meta name="description" content="Manage public status pages for your monitored services.">
  <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/static/css/custom.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config={corePlugins:{preflight:false},darkMode:'class',theme:{extend:{colors:{
      success:'#22c55e',danger:'#ef4444',warning:'#eab308',primary:'#2563eb',
      bg:'var(--bg-main)',card:'var(--bg-panel)',border:'var(--border-main)',hover:'var(--bg-hover)'
    }}}}
  </script>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="app-shell">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="main-content">

    <!-- Top Header -->
    <header class="top-header">
      <div class="header-left">
        <h1 class="header-title">Status Pages</h1>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="theme-btn" title="Toggle theme">
          <i id="theme-toggle-dark-icon" data-lucide="moon"></i>
          <i id="theme-toggle-light-icon" data-lucide="sun" style="color:#eab308;display:none;"></i>
        </button>
      </div>
    </header>

    <!-- Content Body -->
    <div class="content-body" id="content-view" style="padding:32px; overflow-y:auto;">
      <div id="status-pages-content">
        <div style="display:flex;align-items:center;justify-content:center;height:200px;">
          <p style="color:var(--text-muted);">Loading status pages data...</p>
        </div>
      </div>
    </div>

  </main>
</div><!-- /app-shell -->

<script src="/static/js/config.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/app.js?v=3"></script>
<script src="/static/js/toast.js"></script>
<script>
  console.log("Page Loaded: Status Pages");
  lucide.createIcons();

  document.addEventListener("DOMContentLoaded", async () => {
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '/'; return; }

    async function fetchData() {
      const container = document.getElementById('status-pages-content');
      try {
        const res = await fetch('/api/status-pages', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        console.log("Status Pages API response status:", res.status);
        if (res.ok) {
          const data = await res.json();
          console.log("Status Pages data:", data);
          container.innerHTML = `
            <div class="glass-panel" style="text-align:center; padding:60px 40px;">
              <i data-lucide="globe" style="width:56px;height:56px;color:var(--primary);display:block;margin:0 auto 20px;"></i>
              <h2 style="color:#fff;font-size:22px;font-weight:700;margin-bottom:10px;">Status Pages</h2>
              <p style="color:var(--text-muted);font-size:14px;">
                ${data.length > 0 
                  ? `You have <strong style="color:#fff">${data.length}</strong> active status pages.` 
                  : 'No status pages created yet. Create one to share live status with your users.'}
              </p>
              <button class="btn btn-primary" style="margin-top:24px;">
                <i data-lucide="plus"></i> Create Status Page
              </button>
            </div>`;
          lucide.createIcons();
        } else if (res.status === 401) {
          window.location.href = '/';
        } else {
          container.innerHTML = `<div class="glass-panel" style="color:#ef4444;text-align:center;padding:40px;">Failed to load Status Pages data</div>`;
        }
      } catch (e) {
        console.error("Fetch Error:", e);
        container.innerHTML = `<div class="glass-panel" style="color:#ef4444;text-align:center;padding:40px;">Failed to connect to server</div>`;
      }
    }

    fetchData();
  });
</script>
</body>
</html>
